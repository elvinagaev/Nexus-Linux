name: Build Live ISO

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build

      - name: Build the Nexus Linux live ISO
        run: |
          chmod +x live-build/build.sh
          sudo live-build/build.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-linux-live-iso
          path: live-build/*.iso
          if-no-files-found: error
