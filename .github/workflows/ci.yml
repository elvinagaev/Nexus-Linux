name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install Qt headless runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxkbcommon-x11-0 libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          NEXUS_DRY_RUN: "1"
        run: |
          pytest tests/ -v --tb=short

      - name: Verify real (non-editable) installs actually work
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          set -e
          pip install --no-deps ./shared \
            ./nexus-center ./nexus-shell-manager ./nexus-installer ./nexus-update \
            ./nexus-driver ./nexus-store ./nexus-backup ./nexus-gaming ./nexus-settings
          cd /tmp
          python -c "
          import importlib
          apps = ['nexus_center', 'nexus_shell_manager', 'nexus_installer', 'nexus_update',
                  'nexus_driver', 'nexus_store', 'nexus_backup', 'nexus_gaming', 'nexus_settings']
          for name in apps:
              mod = importlib.import_module(f'{name}.main')
              assert mod.PYSIDE6_AVAILABLE, f'{name}.main failed to import PySide6/nexus_common'
          print('All apps import cleanly from a real, non-editable install.')
          "

      - name: Check Debian packaging
        run: |
          dpkg-query -l debhelper || echo "debhelper not available, skipping"

  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pylint
      
      - name: Lint Python files
        run: |
          find . -name "*.py" -type f ! -path "./.venv/*" ! -path "./.*" | head -20 | xargs pylint --disable=all --enable=E,F || true
